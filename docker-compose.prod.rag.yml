# =============================================================================
# Docker Compose - Production Configuration (RAG Server)
# =============================================================================
# 이 파일은 RAG Server EC2 인스턴스에서 사용됩니다.
#
# 인스턴스: RAG Server (t3.small 사용)
# 서비스: RAG Service, Elasticsearch, Redis
#
# Usage:
#   docker-compose -f docker-compose.prod.rag.yml up -d
# =============================================================================

services:
  # ===========================================================================
  # Redis Cache
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: realestate-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ===========================================================================
  # Elasticsearch
  # ===========================================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: realestate-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      # 중요: Security Group에서 App Server의 IP만 허용해야 함
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ===========================================================================
  # RAG Service
  # ===========================================================================
  rag:
    image: 046685909225.dkr.ecr.ap-northeast-2.amazonaws.com/realestate-rag:latest
    container_name: realestate-rag
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --workers 2
    ports:
      - "8001:8001"
    env_file:
      - .env.production
    environment:
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_HOST=elasticsearch
      - PYTHONUNBUFFERED=1
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    depends_on:
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

# =============================================================================
# Volumes
# =============================================================================
volumes:
  redis_data:
    name: realestate-redis-data
  elasticsearch_data:
    name: realestate-elasticsearch-data

# =============================================================================
# Networks
# =============================================================================
networks:
  default:
    driver: bridge
