# =============================================================================
# Docker Compose - Development Configuration
# =============================================================================
# Usage:
#   Development: docker compose up
#   Production:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up
# =============================================================================

services:
  # ===========================================================================
  # Infrastructure Services
  # ===========================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: realestate-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-realestate}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-realestate}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          memory: 1G

  neo4j:
    image: neo4j:5.15
    container_name: realestate-neo4j
    # Graceful shutdown 시간 부여 (lock 파일 정리 시간 확보)
    stop_grace_period: 120s
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      # init.cypher는 scripts 프로필로 별도 실행
      # - ./infra/neo4j/init.cypher:/var/lib/neo4j/import/init.cypher:ro
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - backend-network

  redis:
    image: redis:7-alpine
    container_name: realestate-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          memory: 512M

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: realestate-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          memory: 1G

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: realestate-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q 'available'" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          memory: 1G
    profiles:
      - dashboards

  # ===========================================================================
  # Application Services
  # ===========================================================================
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
      target: runtime
    container_name: realestate-backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./apps/backend:/app
      - ./apps/reco:/app/apps/reco
      - ./scripts:/scripts:ro
      - ./data:/data:ro
      - ./libs:/libs:ro
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - NEO4J_URI=bolt://neo4j:7687
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_HOST=elasticsearch
      - PYTHONUNBUFFERED=1
      - DJANGO_DEBUG=True
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - backend-network
      - frontend-network
    deploy:
      resources:
        limits:
          memory: 1G

  rag:
    build:
      context: .
      dockerfile: infra/docker/rag.Dockerfile
      target: runtime
    container_name: realestate-rag
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./apps/rag:/app
      - ./libs:/libs:ro
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_HOST=elasticsearch
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          memory: 2G

  reco:
    build:
      context: .
      dockerfile: infra/docker/reco.Dockerfile
      target: runtime
    container_name: realestate-reco
    command: python serve.py
    volumes:
      - ./apps/reco:/app
      - ./libs:/libs:ro
      - ./data:/data:ro
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          memory: 2G

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
      target: deps
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        - NEXT_PUBLIC_KAKAO_MAP_KEY=${NEXT_PUBLIC_KAKAO_MAP_KEY}
        - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
        - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
        - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
        - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    container_name: realestate-frontend
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
      - /app/.next
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - SERVER_API_URL=http://backend:8000
      - NEXT_PUBLIC_KAKAO_MAP_KEY=${NEXT_PUBLIC_KAKAO_MAP_KEY}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      - backend
    networks:
      - frontend-network
    deploy:
      resources:
        limits:
          memory: 1G

  # ===========================================================================
  # Utility Services (Profiles)
  # ===========================================================================
  analytics:
    build:
      context: .
      dockerfile: infra/docker/analytics.Dockerfile
    container_name: realestate-analytics
    ports:
      - "8888:8888"
    volumes:
      - ./analytics:/app
      - ./data:/data:ro
    env_file:
      - .env
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          memory: 2G
    profiles:
      - analytics

  scripts:
    build:
      context: .
      dockerfile: infra/docker/scripts.Dockerfile
    container_name: realestate-scripts
    command: python run_all.py
    volumes:
      - ./scripts:/app
      - ./libs:/libs:ro
      - ./data:/data
      - ./apps/reco:/app/apps/reco:ro
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - POSTGRES_HOST=postgres
      - ELASTICSEARCH_HOST=elasticsearch
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          memory: 2G
    profiles:
      - scripts

  crawling:
    build:
      context: .
      dockerfile: infra/docker/crawling.Dockerfile
    container_name: realestate-crawling
    volumes:
      - ./dataCrawling:/app
      - ./data:/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          memory: 2G
    profiles:
      - crawling

# =============================================================================
# Networks
# =============================================================================
networks:
  backend-network:
    driver: bridge
    name: realestate-backend
  frontend-network:
    driver: bridge
    name: realestate-frontend

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    name: realestate-postgres-data
  neo4j_data:
    name: realestate-neo4j-data
  redis_data:
    name: realestate-redis-data
  elasticsearch_data:
    name: realestate-elasticsearch-data
  frontend_node_modules:
    name: realestate-frontend-modules
