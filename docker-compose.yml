version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  neo4j:
    image: neo4j:5.15
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - ./infra/neo4j/init.cypher:/var/lib/neo4j/import/init.cypher

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./apps/backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - NEO4J_URI=bolt://neo4j:7687
    depends_on:
      - postgres
      - redis

  rag:
    build:
      context: .
      dockerfile: infra/docker/rag.Dockerfile
    command: python main.py
    volumes:
      - ./apps/rag:/app
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment: # 환경 추가
      - NEO4J_URI=bolt://neo4j:7687
    depends_on:
      - postgres
      - neo4j

  reco:
    build:
      context: .
      dockerfile: infra/docker/reco.Dockerfile
    command: python serve.py
    volumes:
      - ./apps/reco:/app
    ports:
      - "8002:8002"
    env_file:
      - .env

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
