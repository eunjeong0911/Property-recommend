services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  neo4j:
    image: neo4j:5.15
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - ./infra/neo4j/init.cypher:/var/lib/neo4j/import/init.cypher
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./apps/backend:/app
      - ./apps/reco:/app/apps/reco
      - ./scripts:/scripts
      - ./data:/data
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - NEO4J_URI=bolt://neo4j:7687
      - PYTHONUNBUFFERED=1
      - OPENSEARCH_HOST=opensearch
    depends_on:
      - postgres
      - redis
      - opensearch

  rag:
    build:
      context: .
      dockerfile: infra/docker/rag.Dockerfile
    command: python main.py
    volumes:
      - ./apps/rag:/app
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OPENSEARCH_HOST=opensearch
      - PYTHONUNBUFFERED=1
    depends_on:
      - postgres
      - neo4j
      - redis
      - opensearch

  reco:
    build:
      context: .
      dockerfile: infra/docker/reco.Dockerfile
    command: python serve.py
    volumes:
      - ./apps/reco:/app
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
      target: deps
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        - NEXT_PUBLIC_KAKAO_MAP_KEY=${NEXT_PUBLIC_KAKAO_MAP_KEY}
        - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
        - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
        - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
        - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
      - /app/.next
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_KAKAO_MAP_KEY=${NEXT_PUBLIC_KAKAO_MAP_KEY}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      - backend

  analytics:
    build:
      context: .
      dockerfile: infra/docker/analytics.Dockerfile
    ports:
      - "8888:8888"
    volumes:
      - ./analytics:/app
      - ./data:/data
    env_file:
      - .env
    profiles:
      - analytics

  scripts:
    build:
      context: .
      dockerfile: infra/docker/scripts.Dockerfile
    volumes:
      - ./scripts:/app
      - ./libs:/libs
      - ./data:/data
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - POSTGRES_HOST=postgres
      - OPENSEARCH_HOST=opensearch
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    profiles:
      - scripts

  crawling:
    build:
      context: .
      dockerfile: infra/docker/crawling.Dockerfile
    volumes:
      - ./dataCrawling:/app
      - ./data:/data
    env_file:
      - .env
    profiles:
      - crawling

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
  opensearch_data:
  frontend_node_modules:
