<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bae6fd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGradient)"/>
  
  <!-- House Icon -->
  <g transform="translate(300, 140)">
    <!-- Roof -->
    <path d="M-60 0 L0 -50 L60 0 Z" fill="url(#iconGradient)" opacity="0.9"/>
    <!-- House Body -->
    <rect x="-45" y="0" width="90" height="60" fill="url(#iconGradient)" opacity="0.8" rx="4"/>
    <!-- Door -->
    <rect x="-12" y="20" width="24" height="40" fill="#e0f2fe" rx="2"/>
    <!-- Windows -->
    <rect x="-38" y="12" width="20" height="18" fill="#e0f2fe" rx="2"/>
    <rect x="18" y="12" width="20" height="18" fill="#e0f2fe" rx="2"/>
  </g>
  
  <!-- ONDO HOUSE Text -->
  <text x="300" y="250" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#0284c7" text-anchor="middle">ONDO HOUSE</text>
  
  <!-- 이미지를 준비중입니다 Text -->
  <text x="300" y="290" font-family="Arial, sans-serif" font-size="18" fill="#64748b" text-anchor="middle">이미지를 준비중입니다</text>
</svg>